{% load static %}

<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedAI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
}

.card-ui{
background:white;
color:black;
border-radius:20px;
padding:25px;
}

.logo{
font-size:40px;
font-weight:bold;
}

.founder{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="row">

<div class="col-lg-8">

<div class="card-ui shadow">

<div class="text-center mb-4">

<div class="logo">
🧠 MedAI
</div>

<p>
AI medical assistant
</p>

</div>

<input
id="name"
class="form-control mb-3"
placeholder="Введите имя">

<textarea
id="symptoms"
class="form-control mb-3"
placeholder="Введите симптомы"></textarea>

<button
id="analyze-btn"
type="button"
class="btn btn-primary w-100">

Анализировать

</button>

<div id="result" class="mt-4"></div>

<hr>

<h4>🚑 Вызов врача</h4>

<input
id="address"
class="form-control mb-3"
placeholder="Введите адрес">

<button
id="call-doctor"
type="button"
class="btn btn-danger w-100">

Вызвать врача

</button>

<div
id="doctor-status"
style="display:none;"
class="mt-4">

<p id="status-text"></p>

<p id="eta"></p>

<div class="progress mb-3">

<div
id="progress-bar"
class="progress-bar"
style="width:0%">
</div>

</div>

<p id="gps"></p>

</div>

</div>

</div>

<div class="col-lg-4">

<div class="card-ui shadow">

<div class="text-center">




<img
src="{% static 'patients/cr7.jpg' %}"
class="founder">


<h5 class="mt-3">
ОСНОВАТЕЛЬ
</h5>

<p>
Бекет Алан Канатович
</p>

</div>

<hr>

<h4>
📞 Консультация
</h4>

<input
id="consult-phone"
class="form-control mb-3"
placeholder="Телефон">

<input
id="consult-email"
class="form-control mb-3"
placeholder="Email">

<textarea
id="consult-text"
class="form-control mb-3"
placeholder="Ваш вопрос"></textarea>

<button
id="consult-btn"
type="button"
class="btn btn-success w-100">

Отправить

</button>

<div id="consult-result" class="mt-3"></div>

<hr>

<h5>
📊 AI Статистика
</h5>

<p>
Пациентов:
<span id="patients-count">0</span>
</p>

<p>
Анализов:
<span id="analysis-count">0</span>
</p>

<p>
Вызовов:
<span id="calls-count">0</span>
</p>

</div>

</div>

</div>

<div class="card-ui shadow mt-4">

<h3>
📁 История пациентов
</h3>

<div id="history"></div>

</div>

</div>

<script src="{% static 'patients/script.js' %}"></script>

</body>
</html>
